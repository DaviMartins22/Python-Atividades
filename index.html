<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora de Combustﾃｭvel</title>

<style>

body{
margin:0;
font-family:Arial;
background-image:url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee");
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* CARD PRINCIPAL */

.container{
background:rgba(30,41,59,0.95);
padding:30px;
border-radius:15px;
width:380px;
text-align:center;
color:white;
}

label{
display:block;
text-align:left;
margin-top:10px;
}

input,select{
width:100%;
padding:12px;
margin-top:5px;
border-radius:8px;
border:none;
box-sizing:border-box;
text-align:center;
}

button{
width:100%;
padding:14px;
margin-top:20px;
background:#22c55e;
border:none;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

.result{
margin-top:20px;
font-size:17px;
}

a{
color:#22c55e;
font-weight:bold;
text-decoration:none;
}

/* KM ANIMADO */

.kmAnimado{
font-size:22px;
margin-top:10px;
color:#22c55e;
}

footer{
margin-top:20px;
font-size:12px;
opacity:0.7;
}

</style>

</head>

<body>

<div class="container">

<h2>囓 Calculadora de Combustﾃｭvel</h2>

<label>Origem</label>
<input id="origem" placeholder="Digite a cidade">

<label>Destino</label>
<input id="destino" placeholder="Digite a cidade">

<label>Tipo de veﾃｭculo</label>

<select id="veiculo">
<option>Carro</option>
<option>Moto</option>
<option>ﾃ馬ibus</option>
<option>Caminhﾃ｣o</option>
<option>Van</option>
</select>

<label>Combustﾃｭvel</label>

<select id="combustivel">
<option>Gasolina Comum</option>
<option>Gasolina Aditivada</option>
<option>Etanol Comum</option>
<option>Diesel</option>
<option>GNV</option>
</select>

<label>Preﾃｧo combustﾃｭvel (R$)</label>
<input type="number" id="preco">

<label>Consumo do veﾃｭculo (km/l)</label>
<input type="number" id="consumo">

<button onclick="calcular()">Calcular viagem</button>

<div class="kmAnimado" id="contadorKM"></div>

<div class="result" id="resultado"></div>

<div id="mapLink"></div>

<div id="clima"></div>

<footer>

Desenvolvido por Davi Martins  
Projeto em Construﾃｧﾃ｣o ( Nﾃグ FINALIZADO )  
Aluno de CCO 2023 - 2027

</footer>

</div>

<script>

/* GEOCODE */

async function geocode(lugar){

let url=`https://nominatim.openstreetmap.org/search?format=json&q=${lugar}`

let r=await fetch(url)
let d=await r.json()

return [d[0].lat,d[0].lon]

}

/* CONTADOR KM */

function animarKM(valor){

let km=0

let intervalo=setInterval(()=>{

km+=2

document.getElementById("contadorKM").innerText=`KM calculados: ${km}`

if(km>=valor){

clearInterval(intervalo)

document.getElementById("contadorKM").innerText=`Distﾃ｢ncia: ${valor.toFixed(1)} km`

}

},20)

}

/* CLIMA */

async function climaCidade(cidade){

let url=`https://wttr.in/${cidade}?format=j1`

let r=await fetch(url)

let d=await r.json()

let temp=d.current_condition[0].temp_C

document.getElementById("clima").innerHTML=
`研 Clima em ${cidade}: ${temp}ﾂｰC`

}

/* CALCULO */

async function calcular(){

let origem=document.getElementById("origem").value
let destino=document.getElementById("destino").value

let preco=parseFloat(document.getElementById("preco").value)
let consumo=parseFloat(document.getElementById("consumo").value)

let c1=await geocode(origem)
let c2=await geocode(destino)

let rotaURL=`https://router.project-osrm.org/route/v1/driving/${c1[1]},${c1[0]};${c2[1]},${c2[0]}?overview=false`

let r=await fetch(rotaURL)
let d=await r.json()

let distancia=d.routes[0].distance/1000
let tempo=d.routes[0].duration/3600

animarKM(distancia)

let custoIda=(distancia/consumo)*preco
let custoVolta=custoIda
let total=custoIda+custoVolta

document.getElementById("resultado").innerHTML=

`Tempo estimado: ${tempo.toFixed(1)} horas <br><br>

腸 Ida: R$ ${custoIda.toFixed(2)} <br>
腸 Volta: R$ ${custoVolta.toFixed(2)} <br><br>

ｧｾ Total: R$ ${total.toFixed(2)}`

let origemURL=origem.replace(/ /g,"+")
let destinoURL=destino.replace(/ /g,"+")

document.getElementById("mapLink").innerHTML=

`<br><a href="https://www.google.com/maps/dir/${origemURL}/${destinoURL}" target="_blank">
Ver rota no Google Maps
</a>`

climaCidade(destino)

}

</script>

</body>
</html>
