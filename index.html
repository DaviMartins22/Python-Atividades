<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora de Combustível</title>

<style>

body{
margin:0;
font-family:Arial;
background-image:url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee");
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* CARD PRINCIPAL */

.container{
background:rgba(30,41,59,0.95);
padding:30px;
border-radius:15px;
width:380px;
text-align:center;
color:white;
}

label{
display:block;
text-align:left;
margin-top:10px;
}

input,select{

width:100%;
padding:12px;
margin-top:5px;
border-radius:8px;
border:none;
box-sizing:border-box;
text-align:center;

}

button{

width:100%;
padding:14px;
margin-top:20px;
background:#22c55e;
border:none;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;

}

button:hover{
background:#16a34a;
}

.result{
margin-top:20px;
font-size:17px;
}

a{
color:#22c55e;
font-weight:bold;
text-decoration:none;
}

/* MENSAGENS */

.mensagens{

position:fixed;
bottom:20px;
left:20px;

background:rgba(0,0,0,0.7);
color:white;

padding:15px 20px;
border-radius:10px;

font-size:14px;

animation:fade 1s ease;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* ANIMAÇÃO DO CARRO */

.carro{

position:fixed;
bottom:80px;
right:-120px;

font-size:40px;

animation:carroAndando 12s linear infinite;

}

@keyframes carroAndando{

0%{
right:-120px;
}

100%{
right:110%;
}

}

/* KM ANIMADO */

.kmAnimado{

font-size:22px;
margin-top:10px;
color:#22c55e;

}

footer{
margin-top:20px;
font-size:12px;
opacity:0.7;
}

</style>

</head>

<body>

<div class="container">

<h2>🚗 Calculadora de Combustível</h2>

<label>Origem</label>
<input id="origem" placeholder="Digite a cidade">

<label>Destino</label>
<input id="destino" placeholder="Digite a cidade">

<label>Tipo de veículo</label>

<select id="veiculo">
<option>Carro</option>
<option>Moto</option>
<option>Ônibus</option>
<option>Caminhão</option>
<option>Van</option>
</select>

<label>Combustível</label>

<select id="combustivel">
<option>Gasolina Comum</option>
<option>Gasolina Aditivada</option>
<option>Etanol Comum</option>
<option>Diesel</option>
<option>GNV</option>
</select>

<label>Preço combustível (R$)</label>
<input type="number" id="preco">

<label>Consumo do veículo (km/l)</label>
<input type="number" id="consumo">

<button onclick="calcular()">Calcular viagem</button>

<div class="kmAnimado" id="contadorKM"></div>

<div class="result" id="resultado"></div>

<div id="mapLink"></div>

<div id="clima"></div>

<footer>

Desenvolvido por Davi Martins  
Projeto em Construção ( NÃO FINALIZADO )  
Aluno de CCO 2023 - 2027

</footer>

</div>

<div class="mensagens" id="mensagemBox">
🚗 Dirija com segurança
</div>

<div class="carro">
🚗💨
</div>

<script>

/* GEOCODE */

async function geocode(lugar){

let url=`https://nominatim.openstreetmap.org/search?format=json&q=${lugar}`

let r=await fetch(url)
let d=await r.json()

return [d[0].lat,d[0].lon]

}

/* CONTADOR KM */

function animarKM(valor){

let km=0

let intervalo=setInterval(()=>{

km+=2

document.getElementById("contadorKM").innerText=`KM calculados: ${km}`

if(km>=valor){

clearInterval(intervalo)

document.getElementById("contadorKM").innerText=`Distância: ${valor.toFixed(1)} km`

}

},20)

}

/* CLIMA */

async function climaCidade(cidade){

let url=`https://wttr.in/${cidade}?format=j1`

let r=await fetch(url)

let d=await r.json()

let temp=d.current_condition[0].temp_C

document.getElementById("clima").innerHTML=
`🌤 Clima em ${cidade}: ${temp}°C`

}

/* CALCULO */

async function calcular(){

let origem=document.getElementById("origem").value
let destino=document.getElementById("destino").value

let preco=parseFloat(document.getElementById("preco").value)
let consumo=parseFloat(document.getElementById("consumo").value)

let c1=await geocode(origem)
let c2=await geocode(destino)

let rotaURL=`https://router.project-osrm.org/route/v1/driving/${c1[1]},${c1[0]};${c2[1]},${c2[0]}?overview=false`

let r=await fetch(rotaURL)
let d=await r.json()

let distancia=d.routes[0].distance/1000
let tempo=d.routes[0].duration/3600

animarKM(distancia)

let custoIda=(distancia/consumo)*preco
let custoVolta=custoIda
let total=custoIda+custoVolta

document.getElementById("resultado").innerHTML=

`Tempo estimado: ${tempo.toFixed(1)} horas <br><br>

💰 Ida: R$ ${custoIda.toFixed(2)} <br>
💰 Volta: R$ ${custoVolta.toFixed(2)} <br><br>

🧾 Total: R$ ${total.toFixed(2)}`

let origemURL=origem.replace(/ /g,"+")
let destinoURL=destino.replace(/ /g,"+")

document.getElementById("mapLink").innerHTML=

`<br><a href="https://www.google.com/maps/dir/${origemURL}/${destinoURL}" target="_blank">
Ver rota no Google Maps
</a>`

climaCidade(destino)

}

/* MENSAGENS */

let mensagens=[

"🚗 Dirija com segurança e respeitando as leis",
"⚠️ Use sempre o cinto de segurança",
"🛣️ Respeite os limites de velocidade",
"📵 Não use celular ao volante, pode causar graves consequências",
"🛑 Se beber não dirija, pode resultar em acidente",
"🌄 Aproveite a viagem com responsabilidade e admire a paisagem",
"🚦 Atenção aos sinais de trânsito ou levará multa",
"⛽ Planeje sua viagem antes de sair, se não vai se perder"

]

let index=0

setInterval(()=>{

index++

if(index>=mensagens.length){
index=0
}

let box=document.getElementById("mensagemBox")

box.style.animation="none"

setTimeout(()=>{
box.innerText=mensagens[index]
box.style.animation="fade 1s ease"
},100)

},5000)

</script>

</body>

</html>
